body:
  text: 粵若稽古逖聽風聲握神紀以應物遊靈教而至道者有矣咸弘之在人道不虛泄然則軒從七聖蘭葉傳文舜共三公芝泥觀字周朝關令望東氣而稽首丘門弟子向北斗而磬折天書道記可略言也蓋不出於九流且未聞於三世我大齊之君區有義不思家傳天帝之尊世祚輪王之貴一人示見百辟應生俯順龜龍託迹雲火翠鳳將寶幢共舉靈鼉與法鼓俱震萬機兼十善之化四門雜三乘之賓自迦葉結集蔡愔遊返持綖之經盛於茲日龍宮斯盡象載未勝特進驃騎大將軍開府儀同三司尚書令并州大中正食司州濮陽郡幹長安縣開國侯晉昌郡開國公唐邕挺固理時生而為世秉文經武來處廟堂從扣而鳴隨病與藥待群方而似鏡應眾務其如響四海仰以彌高千官挹而滿腹眷言法寶是所歸依以為縑緗有壞簡策非久金牒難求皮紙易滅於是發七處之印開七寶之函訪蓮華之書命銀鉤之迹一音所說盡勒名山於鼓山石窟之所寫維摩詰經一部勝鬘經一部孛經一部彌勒成佛經一部起天統四年三月一日盡武平三年歲次壬辰五月廿八日澗谷虛靜邑居閑曠林疑極妙艸匹文柔禽繞空中獸依樹下水音發而覺道風響動而悟物戒行之徒允集慧定之侶攸歸如日貫雲常轉不息非恐畏未苦風寒石比夜光非待螢雪毗沙上度敕眾鬼而護持大梵來遊領群神而保衛善因普被願力薰脩當使世界同於淨土皇基固於大地置六道於十山沐四生於八乃及無邊皆取正覺海收經籍斯文必傳山從水火此方無壞重宣茲義乃作銘曰天文星象人文書契先聖後賢道纔身世惟皇建國教通群藝德實無為化窮兼濟諸法為祖諸經亦王一文半偈與物行藏天縱上士時應有方群迷升極至道津梁殺青有缺韋編有絕一託貞堅永垂昭晰天神左右天王擁衛書未仙遊字無飛滅地遙常寂山空避喧承風覺道海渧難論水流可閱日去無翻乘茲誓願福地常存
